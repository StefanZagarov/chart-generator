<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="parchment" cx="0.42" cy="0.38" r="0.75">
      <stop offset="0" stop-color="#fffbf0"/>
      <stop offset="0.55" stop-color="#f2ead8"/>
      <stop offset="1" stop-color="#e4d5b6"/>
    </radialGradient>
  </defs>

  <!-- parchment disc with a gold double ring, echoing the app's double borders -->
  <circle cx="512" cy="512" r="500" fill="url(#parchment)"/>
  <circle cx="512" cy="512" r="500" fill="none" stroke="#a5906c" stroke-width="14"/>
  <circle cx="512" cy="512" r="464" fill="none" stroke="#a5906c" stroke-width="6"/>

  <!-- 12 house ticks between the rings -->
  <g stroke="#4a3826" stroke-width="10" stroke-linecap="round">
    <line x1="512" y1="52"  x2="512" y2="96"/>
    <line x1="512" y1="928" x2="512" y2="972"/>
    <line x1="52"  y1="512" x2="96"  y2="512"/>
    <line x1="928" y1="512" x2="972" y2="512"/>
    <line x1="282" y1="113.7" x2="304" y2="151.8"/>
    <line x1="720" y1="872.2" x2="742" y2="910.3"/>
    <line x1="282" y1="910.3" x2="304" y2="872.2"/>
    <line x1="720" y1="151.8" x2="742" y2="113.7"/>
    <line x1="113.7" y1="282" x2="151.8" y2="304"/>
    <line x1="872.2" y1="720" x2="910.3" y2="742"/>
    <line x1="113.7" y1="742" x2="151.8" y2="720"/>
    <line x1="872.2" y1="304" x2="910.3" y2="282"/>
  </g>

  <!-- sun glyph: circle with center dot, in ink -->
  <circle cx="512" cy="512" r="238" fill="none" stroke="#4a3826" stroke-width="30"/>
  <circle cx="512" cy="512" r="62" fill="#8f3b2c"/>

  <!-- ascendant line reaching the inner ring on the left, per the wheel's asc-at-180° -->
  <line x1="99" y1="512" x2="274" y2="512" stroke="#4a3826" stroke-width="18" stroke-linecap="round"/>
</svg>
