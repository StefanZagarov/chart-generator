# Desktop installers. Tauri can't cross-compile, so each OS builds its own:
# windows-latest → NSIS .exe + .msi (the primary target), ubuntu → .deb/.rpm/.AppImage.
# On a v* tag it drafts a GitHub release with the installers attached;
# on manual dispatch it just builds and uploads them as workflow artifacts.
name: desktop

on:
  push:
    tags: ["v*"]
    # temporary: verify the pipeline from this branch (workflow_dispatch only
    # works once the workflow exists on the default branch) — remove on merge
    branches: [desktop]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write # tauri-action needs it to create the release
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, ubuntu-22.04]
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # only tag pushes create a (draft) release; dispatch runs just build
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: ${{ github.ref_type == 'tag' && format('Natal Chart {0}', github.ref_name) || '' }}
          releaseDraft: true

      - name: Upload installers as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn
