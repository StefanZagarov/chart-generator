# Desktop installers. Tauri can't cross-compile, so each OS builds its own:
# windows-latest → NSIS .exe + .msi (the primary target), ubuntu → .deb/.rpm/.AppImage.
# Every run uploads the installers as workflow artifacts; a v* tag additionally
# collects them into a draft GitHub release.
name: desktop

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - run: npm run tauri build
      - uses: actions/upload-artifact@v4
        with:
          name: bundles-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - run: npm run tauri build

      # The bundler ships this runner's (Ubuntu 22.04) libwayland-* inside the
      # AppImage. On distros with a newer Mesa (verified on Arch, 2026-07) the
      # host EGL loads those stale copies via LD_LIBRARY_PATH and dies with
      # EGL_BAD_PARAMETER → WebKit aborts → white window. Every desktop distro
      # ships libwayland (ABI-stable, additive), so deleting the bundled copies
      # makes the AppImage use the host's and fixes rendering everywhere.
      - name: Strip stale libwayland from AppImage
        run: |
          cd src-tauri/target/release/bundle/appimage
          APP=$(ls *.AppImage)
          "./$APP" --appimage-extract > /dev/null
          rm -f squashfs-root/usr/lib/libwayland-*
          curl -sLo appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          rm "$APP"
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run squashfs-root "$APP"
          rm -rf squashfs-root appimagetool

      - uses: actions/upload-artifact@v4
        with:
          name: bundles-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

  release:
    if: github.ref_type == 'tag'
    needs: [windows, linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: bundles
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          name: Natal Chart ${{ github.ref_name }}
          draft: true
          files: bundles/**
